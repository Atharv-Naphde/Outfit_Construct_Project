<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=6.0, user-scalable=yes">
    <meta charset="utf-8"/>
    <meta name="description" content="Outfit Construct">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'styles.css' %}"/>
    <script src="https://kit.fontawesome.com/5410f4c7f8.js" crossorigin="anonymous"></script>

    <title>Outfit Construct</title>
</head>
<body lang = en>
    <!--The code below is responsible for the Navigation Bar, and should be on every page-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a href="{% url 'home' %}" class="plainLink"><img src="{% static 'images/outfit_construct_logo_transparent.png' %}" width = "150px" height="69px" alt="Selected clothing"></a>
        </div>
        <a class="navbar-brand" href="{% url 'home' %}"> </a><!--This could include text in the top right-->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <!---This code is responsible for the Icons and Names in the top-right corner.-->
            <ul class="navbar-nav">
                <li class="nav-item">
                    <!--This code redirects to the home page.-->
                    <a class="nav-link" href="{% url 'home' %}">&nbsp;&nbsp;<i class="fa-solid fa-house"></i>Home</a>
                </li>
                <li class="nav-item">
                    <!--This is the link to the search page. Include Search for Shows and Arists-->
                    <a class="nav-link" href="{% url 'createPage' %}">&nbsp;&nbsp;&nbsp;<i class="fa-solid fa-shirt"></i>Closet</a>
                </li>
            </ul>
        </div>
    </nav>

    <!--The code below is responsible for everything displayed on this page-->
    <!--The code below is responsible for the Trending section-->
    <div class="container mb-3 homepage">
        <!--<div class="jumbotron mb-3 p-5">
            <h2 class="giant">&nbsp; &nbsp;Welcome to Outfit Construct!</h2>
        </div>  -->
        <br>
            <br>
    <div class = container>
            <div class = "row mb-3">
            <h3>All clothes: </h3>
                {% for drawer in drawers %}
                            <div class="col-2 card bg-dark m-3"> <a href = "{% url 'selected_clothing' %}?cloth_id={{ drawer.cloth_id }}">
                                <h3 class = "plainLink smallText">{{drawer.cloth_description}}</h3>
                                </a>
                            </div>
                {% endfor %}
            </div>
             <br>
        </div>
    </div>
    <br>
    <br>
</body>
</html>
